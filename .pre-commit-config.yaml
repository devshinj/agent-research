repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff lint
        entry: uv run ruff check
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format check
        entry: uv run ruff format --check
        language: system
        types: [python]

      - id: mypy
        name: mypy type check
        entry: uv run mypy src/
        language: system
        types: [python]
        pass_filenames: false

      - id: structural-tests
        name: structural tests
        entry: uv run pytest tests/structural/ -x -q
        language: system
        pass_filenames: false
