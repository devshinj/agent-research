paper_trading:
  initial_balance: 0
  max_position_pct: 0.25
  max_open_positions: 4
  fee_rate: 0.0005
  slippage_rate: 0.0005
  min_order_krw: 5000
  max_additional_buys: 1
  additional_buy_drop_pct: 0.03
  additional_buy_ratio: 0.5
risk:
  stop_loss_pct: 0.03
  take_profit_pct: 0.08
  trailing_stop_pct: 0.015
  max_daily_loss_pct: 0.05
  max_daily_trades: 500
  consecutive_loss_limit: 5
  cooldown_minutes: 60
  partial_take_profit_pct: 0.04
  partial_sell_fraction: 0.5
screening:
  min_volume_krw: 1000000000
  min_volatility_pct: 10
  max_volatility_pct: 50
  max_coins: 8
  refresh_interval_min: 30
  always_include:
  - KRW-BTC
strategy:
  lookahead_minutes: 30
  threshold_pct: 0.2
  retrain_interval_hours: 1
  min_confidence: 0.35
collector:
  candle_timeframe: 1
  max_candles_per_market: 500
  train_timeframe: 5
  train_candles: 2880
  daily_candles: 30
  market_refresh_interval_min: 60
  context_timeframes:
  - minutes: 1
    candles: 500
    interval_sec: 60
  - minutes: 3
    candles: 4800
    interval_sec: 180
  - minutes: 10
    candles: 1440
    interval_sec: 600
  - minutes: 15
    candles: 960
    interval_sec: 900
  - minutes: 60
    candles: 240
    interval_sec: 3600
entry_analyzer:
  enabled: true
  min_entry_score: 0.3
  price_lookback_candles: 60
data:
  db_path: data/paper_trader.db
  model_dir: data/models
  stale_candle_days: 10
  stale_model_days: 30
  stale_order_days: 90
auth:
  access_token_expire_minutes: 30
  refresh_token_expire_days: 7
