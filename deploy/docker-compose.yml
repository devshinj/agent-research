services:
  app:
    image: agent-research-app:latest
    ports:
      - "${API_PORT:-8002}:8000"
    env_file: .env
    volumes:
      - app-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  web:
    image: agent-research-web:latest
    ports:
      - "${WEB_PORT:-3001}:80"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  app-data:
