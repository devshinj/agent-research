services:
  app:
    image: agent-research-app:latest
    ports:
      - "${API_PORT:-8001}:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  web:
    image: agent-research-web:latest
    ports:
      - "${WEB_PORT:-443}:443"
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./ssl:/etc/ssl/app
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
